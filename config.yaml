llm:
  api_base: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  max_tokens: 4096
  temperature: 0.1

paths:
  sample_report: "./reference/sample_report.xlsx"
  sample_files_dir: "./reference/sample_files/"
  invoices_dir: "./invoices/"
  output_dir: "./output/"
  persons_file: "./data/persons.json"
  processed_file: "./data/processed.json"
  exchange_rate_cache_dir: "./data/exchange_rate_cache/"

exchange_rate:
  source: "chinamoney"
  currencies:
    - USD
    - HKD
    - EUR
    - GBP
    - JPY
    - SGD
    - AUD
    - CAD
    - CHF

dedup:
  fuzzy_match_threshold: 0.85
  amount_tolerance: 0.01

ocr:
  pdf_dpi: 300
  languages: ["ch", "en"]
